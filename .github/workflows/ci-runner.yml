name: ci-runner

on:
  pull_request:
    paths:
      - "jump_agent_runner/**"
      - ".github/workflows/ci-runner.yml"
  push:
    branches: [main]
    paths:
      - "jump_agent_runner/**"
      - ".github/workflows/ci-runner.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jump_agent_runner

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check jump_agent_runner tests

      - name: Tests (pytest)
        run: pytest -ra
