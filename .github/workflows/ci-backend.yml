name: ci-backend

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "backend/**"
      - "jump_storage/**"
      - ".github/workflows/ci-backend.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "jump_storage/**"
      - ".github/workflows/ci-backend.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jump
          POSTGRES_PASSWORD: jump
          POSTGRES_DB: jump_report
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U jump"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://jump:jump@localhost:5432/jump_report
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-secret-change-me
      WORKER_SHARED_SECRET: ci-worker-token
      WORKER_HMAC_KEY: ci-worker-hmac

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install jump-storage (sibling package)
        working-directory: jump_storage
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install backend
        run: |
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Type check (mypy)
        run: mypy app
        continue-on-error: true

      - name: Tests (pytest)
        run: pytest -ra
